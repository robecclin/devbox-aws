---
name: Start Devbox

'on':
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c  # v6.2.3
        with:
          aws-region: ${{ vars.DEVBOX_AWS_REGION }}
          role-to-assume: ${{ vars.DEVBOX_AWS_ROLE_ARN }}
      - run: |
          aws ec2 start-instances --instance-ids ${{ vars.DEVBOX_INSTANCE_ID }} > /dev/null
          aws ec2 wait instance-running --instance-ids ${{ vars.DEVBOX_INSTANCE_ID }}
    timeout-minutes: 2
