---
name: Stop Devbox

'on':
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d  # v6.2.2
        with:
          aws-region: ${{ vars.DEVBOX_AWS_REGION }}
          role-to-assume: ${{ vars.DEVBOX_AWS_ROLE_ARN }}
      - run: |
          aws ec2 stop-instances --instance-ids ${{ vars.DEVBOX_INSTANCE_ID }} > /dev/null
          aws ec2 wait instance-stopped --instance-ids ${{ vars.DEVBOX_INSTANCE_ID }}
    timeout-minutes: 2
